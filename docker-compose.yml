services:
  auth:
    build: ./auth
    expose:
      - "5001"
    volumes:
      - auth-instance:/data/instance
    environment:
      - INSTANCE_PATH=/data/instance

  shortener:
    build: ./shortener
    expose:
      - "5000"
    volumes:
      - shortener-instance:/data/instance
    environment:
      - INSTANCE_PATH=/data/instance
      - AUTH_BASE_URL=http://auth:5001
    depends_on:
      - auth

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - auth
      - shortener

volumes:
  auth-instance:
  shortener-instance:
